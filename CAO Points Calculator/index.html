<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minimum CAO Points Calculator</title>
    <link href="/style.css" rel="stylesheet" type="text/css" media="all">
  </head>

  <body>
    <div class="content">

        <div class="card">
            <span>CAO Points Calculator</span>
        </div>

        <div class="main-content">
            <div class="addSubject">
                <input type="text" id="subjectNameTBOX" class="textBox">
                <button type="button" id="addSubjectBTN">Add subject</button>
            </div>
    
            <div class="container" id="container">
            </div>
        </div>

        <div class="card">
          <span>Total (or top 6) Points:</span>
          <span id="totalPointsTXT">0</span>
        </div>

    </div> 
    
  
  <script src="element_creator.js"></script>
  </body>
</html>
